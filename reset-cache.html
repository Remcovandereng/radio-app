<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body style="font-family:system-ui;background:#070707;color:white;padding:24px"><h1>Cache reset</h1><script>(async()=>{if('serviceWorker'in navigator){for(const r of await navigator.serviceWorker.getRegistrations())await r.unregister()}if('caches'in window){for(const k of await caches.keys())await caches.delete(k)}document.body.innerHTML+='<p>Klaar. Open <a style="color:#ff7a00" href="./?v=7">v7</a>.</p>'})()</script></body></html>
